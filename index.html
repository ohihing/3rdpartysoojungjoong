<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출판콘텐츠사업단 대시보드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-area">
        <div class="menu-trigger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <header>
            <h1 id="page-title">출판콘텐츠사업단 <span>종합 대시보드</span></h1>
            <p class="last-update">* 조회일 기준 출간 1년 내 도서 대상</p>
            <p class="last-update">* 주중 오전 9시 데이터 갱신</p>
        </header>
    </div>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">MENU</div>
        <ul>
            <li onclick="showPage('dashboard')">🏠 1. 종합 대시보드</li>
            <li onclick="showPage('stock')">📊 2. 신간 판매 현황</li>
        </ul>
    </nav>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <nav class="tab-wrapper metric-wrapper">
            <button id="m-btn-index" class="metric-btn active" onclick="switchMetric('index')">판매지수 조회</button>
            <button id="m-btn-sales" class="metric-btn" onclick="switchMetric('sales')">판매량 조회</button>
        </nav>

        <nav class="tab-wrapper channel-wrapper">
            <button class="tab-btn active" onclick="switchChannel('yes24')">예스24</button>
            <button class="tab-btn" onclick="switchChannel('aladin')">알라딘</button>
            <button class="tab-btn" onclick="switchChannel('kyobo')">교보문고</button>
        </nav>

        <nav id="kyobo-sub-tab" class="tab-wrapper sub-wrapper" style="display:none;">
            <button class="sub-btn" onclick="switchKyoSub('store')">매장</button>
            <button class="sub-btn" onclick="switchKyoSub('online')">인터넷</button>
            <button class="sub-btn" onclick="switchKyoSub('whole')">도매</button>
            <button class="sub-btn active" onclick="switchKyoSub('total')">누적</button>
        </nav>

        <main id="dashboard-view" class="page-view"></main>
        <main id="stock-view" class="page-view" style="display:none;"></main>
    </div>
    <script src="script.js"></script>
</body>
</html>
